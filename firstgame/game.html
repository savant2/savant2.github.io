<!DOCTYPE html>
<html>
    <head>
        <title>INTO THE MINES</title>
    </head>

    <body class="battle" style="background-color: bisque; font-family: monospace;">
        <h1 id="Dusty">A WILD DUST SPRITE APPEARS</h1>
        <section class="DustSprite">
            <img src=".\assets\Dust_Sprite.png" aria-label="an image of a Dust Sprite from Stardew Valley, tier 1" alt="Dust Sprite"></img>
            <h3>10/10 HP</h3>
        </section>
        <div style="background-color: green;"><p><p><p>&nbsp;</p></p></p></div>
        <section class="Chicken">
            <img src=".\assets\Blue_Chicken.png" aria-label="an image of a blue chicken from Stardew Valley, tier 1" alt="Blue Chicken"></img>
            <h3>10/10 HP</h3>
            <ol>
                <li><button>FIGHT</button></li>
                <li><label id="item" for="item-select">ITEM</label>
                    <select id="item-select">
                        <option value="grass">GRASS</option>
                        <option value="hay">HAY</option>
                    </select>
                </li>
                <li><button>SWITCH</button></li>
                <li><button>FLEE</button></li>
            </ol>
        </section>
    </body>
</html>
