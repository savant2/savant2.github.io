<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating/Changing Content Dyamically Using Javascript</title>
    <script src="data.js"></script>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="trainer">
        <header>
            <h1>TRAINER CARD: <span id="name"></span></h1>
        </header>
        <h2 id="name"></h2>
        <div class="container">
            <div class="id-badge">
                <div id="pokemon-side"></div>
                <div id="trainer"></div>
            </div>
            <div id="badges">
                <div>
                    <h1>BADGES</h1>
                </div>
            </div>
            <div id="credits">Background, player sprite and badges assets from <a
                    href="https://www.pokecharms.com/trainercards">Pokecharms Trainer Card Builder</a><br />
                Pokemon Assets from: <a href="https://pokemondb.net">Pokemon DB</a></div>
        </div>
    </div>   
</body>
</html>
